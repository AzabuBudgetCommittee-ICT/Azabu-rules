name: Build And Deploy Search Index

on:
  push:
    paths:
      - rules/**
      - metadata/**
      - scripts/build_index.py
      - metadata_schema.py
      - requirements.txt
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      has_targets: ${{ steps.detect.outputs.has_targets }}
      is_full_build: ${{ steps.detect.outputs.is_full_build }}
      rule_ids: ${{ steps.detect.outputs.rule_ids }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Target Rule IDs
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "is_full_build=true" >> "$GITHUB_OUTPUT"
            echo "has_targets=true" >> "$GITHUB_OUTPUT"
            echo "rule_ids=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before_sha="${{ github.event.before }}"
          after_sha="${{ github.sha }}"

          force_full_build=false
          if [[ "$before_sha" == "0000000000000000000000000000000000000000" ]]; then
            changed_status="$(git ls-tree -r --name-only "$after_sha" | awk '{print "A\t" $0}')"
          else
            changed_status="$(git diff --name-status "$before_sha" "$after_sha")"
            if printf '%s\n' "$changed_status" | grep -qE '^(D|R)'; then
              force_full_build=true
            fi
          fi

          mapfile -t changed_files < <(
            printf '%s\n' "$changed_status" \
              | awk -F '\t' '{
                  if ($1 ~ /^R/) {
                    print $2
                    print $3
                  } else {
                    print $2
                  }
                }' \
              | sed '/^$/d'
          )

          mapfile -t candidate_rule_ids < <(
            printf '%s\n' "${changed_files[@]:-}" \
              | sed -nE 's#^rules/([0-9]{4}(CON|LAW|RUL)[0-9]{7})/.*#\1#p; s#^metadata/([0-9]{4}(CON|LAW|RUL)[0-9]{7})\.json$#\1#p' \
              | sort -u
          )

          valid_rule_ids=()
          missing_counterpart=false
          for rule_id in "${candidate_rule_ids[@]:-}"; do
            if [[ -d "rules/$rule_id" && -f "metadata/$rule_id.json" ]]; then
              valid_rule_ids+=("$rule_id")
            else
              missing_counterpart=true
            fi
          done

          if [[ "$force_full_build" == "true" || "$missing_counterpart" == "true" ]]; then
            echo "is_full_build=true" >> "$GITHUB_OUTPUT"
            echo "has_targets=true" >> "$GITHUB_OUTPUT"
            echo "rule_ids=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ ${#valid_rule_ids[@]} -eq 0 ]]; then
            echo "is_full_build=false" >> "$GITHUB_OUTPUT"
            echo "has_targets=false" >> "$GITHUB_OUTPUT"
            echo "rule_ids=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "is_full_build=false" >> "$GITHUB_OUTPUT"
          echo "has_targets=true" >> "$GITHUB_OUTPUT"
          echo "rule_ids=${valid_rule_ids[*]}" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        if: steps.detect.outputs.has_targets == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore Previous Public Cache
        if: steps.detect.outputs.has_targets == 'true'
        id: restore-public
        uses: actions/cache@v4
        with:
          path: public
          key: public-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            public-${{ github.ref_name }}-
            public-

      - name: Install Dependencies
        if: steps.detect.outputs.has_targets == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Index (Full)
        if: steps.detect.outputs.has_targets == 'true' && steps.detect.outputs.is_full_build == 'true'
        run: python scripts/build_index.py

      - name: Build Index (Diff)
        if: steps.detect.outputs.has_targets == 'true' && steps.detect.outputs.is_full_build != 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f public/search/documents.json && -f public/rules-index.json ]]; then
            echo "Running differential build with restored public cache."
            read -r -a rule_ids <<< "${{ steps.detect.outputs.rule_ids }}"
            python scripts/build_index.py --rule-ids "${rule_ids[@]}"
          else
            echo "Previous index artifacts are missing; falling back to full build."
            python scripts/build_index.py
          fi

      - name: Configure GitHub Pages
        if: steps.detect.outputs.has_targets == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        if: steps.detect.outputs.has_targets == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    if: needs.build.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy To GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
