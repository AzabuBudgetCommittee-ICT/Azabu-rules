name: Build And Deploy Search Index

on:
  push:
    paths:
      - rules/**
      - metadata/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      has_targets: ${{ steps.detect.outputs.has_targets }}
      is_full_build: ${{ steps.detect.outputs.is_full_build }}
      rule_ids: ${{ steps.detect.outputs.rule_ids }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Target Rule IDs
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "is_full_build=true" >> "$GITHUB_OUTPUT"
            echo "has_targets=true" >> "$GITHUB_OUTPUT"
            echo "rule_ids=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before_sha="${{ github.event.before }}"
          after_sha="${{ github.sha }}"

          if [[ "$before_sha" == "0000000000000000000000000000000000000000" ]]; then
            changed_files="$(git ls-tree -r --name-only "$after_sha")"
          else
            changed_files="$(git diff --name-only "$before_sha" "$after_sha")"
          fi

          mapfile -t candidate_rule_ids < <(
            printf '%s\n' "$changed_files" \
              | sed -nE 's#^rules/([0-9]{4}(CON|LAW|RUL)[0-9]{7})/.*#\1#p; s#^metadata/([0-9]{4}(CON|LAW|RUL)[0-9]{7})\.json$#\1#p' \
              | sort -u
          )

          valid_rule_ids=()
          for rule_id in "${candidate_rule_ids[@]:-}"; do
            if [[ -d "rules/$rule_id" && -f "metadata/$rule_id.json" ]]; then
              valid_rule_ids+=("$rule_id")
            fi
          done

          if [[ ${#valid_rule_ids[@]} -eq 0 ]]; then
            echo "is_full_build=false" >> "$GITHUB_OUTPUT"
            echo "has_targets=false" >> "$GITHUB_OUTPUT"
            echo "rule_ids=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "is_full_build=false" >> "$GITHUB_OUTPUT"
          echo "has_targets=true" >> "$GITHUB_OUTPUT"
          echo "rule_ids=${valid_rule_ids[*]}" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        if: steps.detect.outputs.has_targets == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        if: steps.detect.outputs.has_targets == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Index (Full)
        if: steps.detect.outputs.has_targets == 'true' && steps.detect.outputs.is_full_build == 'true'
        run: python scripts/build_index.py

      - name: Build Index (Diff)
        if: steps.detect.outputs.has_targets == 'true' && steps.detect.outputs.is_full_build != 'true'
        shell: bash
        run: |
          set -euo pipefail
          read -r -a rule_ids <<< "${{ steps.detect.outputs.rule_ids }}"
          python scripts/build_index.py --rule-ids "${rule_ids[@]}"

      - name: Configure GitHub Pages
        if: steps.detect.outputs.has_targets == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        if: steps.detect.outputs.has_targets == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    if: needs.build.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy To GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
